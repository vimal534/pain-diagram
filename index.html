<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pain Diagram</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #E8EAED;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Plus Jakarta Sans', sans-serif;
      }

      /* ── iPhone 16 outer frame ── */
      .iphone-frame {
        position: relative;
        width: 418px;
        height: 896px;
        transform: scale(0.82);
        transform-origin: top center;
        background: linear-gradient(145deg, #C8CAC9 0%, #A8AAAA 30%, #B8BABA 60%, #9A9C9C 100%);
        border-radius: 56px;
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.55) inset,
          0 0 0 2px rgba(0,0,0,0.22),
          0 30px 80px rgba(0,0,0,0.45),
          0 8px 24px rgba(0,0,0,0.28);
        padding: 14px;
      }

      /* screen bezel (inner black border) */
      .iphone-screen {
        position: relative;
        width: 100%;
        height: 100%;
        background: #000;
        border-radius: 44px;
        overflow: hidden;
      }

      /* the app lives here */
      #root {
        width: 390px;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        overflow: hidden;
        border-radius: 40px;
        background: #fff;
      }

      /* Dynamic Island */
      .dynamic-island {
        position: absolute;
        top: 13px;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 35px;
        background: #000;
        border-radius: 20px;
        z-index: 9999;
        pointer-events: none;
      }

      /* ── Side buttons ── */
      /* Volume up */
      .btn-vol-up {
        position: absolute;
        left: -4px;
        top: 168px;
        width: 4px;
        height: 72px;
        background: linear-gradient(to right, #888, #AEAEAE, #888);
        border-radius: 3px 0 0 3px;
        box-shadow: -1px 0 2px rgba(0,0,0,0.3);
      }
      /* Volume down */
      .btn-vol-down {
        position: absolute;
        left: -4px;
        top: 256px;
        width: 4px;
        height: 72px;
        background: linear-gradient(to right, #888, #AEAEAE, #888);
        border-radius: 3px 0 0 3px;
        box-shadow: -1px 0 2px rgba(0,0,0,0.3);
      }
      /* Mute/Action button */
      .btn-action {
        position: absolute;
        left: -4px;
        top: 112px;
        width: 4px;
        height: 38px;
        background: linear-gradient(to right, #888, #AEAEAE, #888);
        border-radius: 3px 0 0 3px;
        box-shadow: -1px 0 2px rgba(0,0,0,0.3);
      }
      /* Power/Sleep */
      .btn-power {
        position: absolute;
        right: -4px;
        top: 192px;
        width: 4px;
        height: 90px;
        background: linear-gradient(to left, #888, #AEAEAE, #888);
        border-radius: 0 3px 3px 0;
        box-shadow: 1px 0 2px rgba(0,0,0,0.3);
      }

      /* Bottom USB-C notch */
      .usbc {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 52px;
        height: 10px;
        background: #1a1a1a;
        border-radius: 5px;
      }

      /* Home indicator inside the screen */
      .home-indicator {
        position: absolute;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 130px;
        height: 5px;
        background: rgba(0,0,0,0.22);
        border-radius: 3px;
        z-index: 9999;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="iphone-frame">
      <!-- physical buttons -->
      <div class="btn-action"></div>
      <div class="btn-vol-up"></div>
      <div class="btn-vol-down"></div>
      <div class="btn-power"></div>
      <!-- USB-C port -->
      <div class="usbc"></div>

      <div class="iphone-screen">
        <!-- Dynamic Island pill -->
        <div class="dynamic-island"></div>
        <!-- Home indicator bar -->
        <div class="home-indicator"></div>
        <div id="root"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
